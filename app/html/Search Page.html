<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Food\+ Portal \- Search</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<header class="navbar">
  <div class="brand">Food\+ Portal</div>
  <nav>
    <a href="mainPage.html">Home</a>
    <a href="searchPage.html" class="active">Search</a>
    <a href="mapPage.html">Map</a>
    <a href="cartPage.html">Cart</a>
    <a href="accountPage.html">Account</a>
  </nav>
</header>

<main class="container">
  <h1>Search services</h1>
  <div class="search-bar">
    <input type="text" placeholder="Service or organization">
    <input type="text" placeholder="City or postal code">
    <select>
      <option>All services</option>
      <option>Food bank</option>
      <option>Meal program</option>
      <option>Community fridge</option>
      <option>Food recycling</option>
    </select>
    <button class="btn">Search</button>
  </div>

  <section class="grid">
    <article class="card">
      <h4>Community Kitchen</h4>
      <p>Hot meals \- Mon, Wed, Fri</p>
      <button class="btn-outline">Add to cart</button>
    </article>
    <article class="card">
      <h4>Downtown Food Bank</h4>
      <p>Pickup \- Tue, Thu</p>
      <button class="btn-outline">Add to cart</button>
    </article>
    <article class="card">
      <h4>West End Community Fridge</h4>
      <p>Open24/7</p>
      <button class="btn-outline">Add to cart</button>
    </article>
  </section>
</main>
</body>
</html>
