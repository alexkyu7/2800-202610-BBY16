<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Food\+ Portal \- Search</title>
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="stylesheet" href="/css/favorite.css">
</head>
<body>
<header class="navbar">
  <div class="brand">Food\+ Portal</div>
  <nav>
    <a href="mainPage.html">Home</a>
    <a href="searchPage.html" class="active">Search</a>
    <a href="mapPage.html">Map</a>
    <a href="cartPage.html">Cart</a>
    <a href="accountPage.html">Account</a>
  </nav>
</header>

  <main class="favorites-page">

    <section class="page-header">
      <h1>Your Favorites</h1>
      <p>Saved meals, restaurants, and items you love.</p>
    </section>

    <section class="favorites-grid">

      <!-- Favorite Card -->
      <div class="favorite-card">
        <img src="images/burger.jpg" alt="Burger Meal">

        <div class="card-content">
          <h2>Classic Burger</h2>
          <p>Juicy beef burger with fries.</p>

          <div class="card-footer">
            <span class="price">$12.99</span>
            <button>Remove</button>
          </div>
        </div>
      </div>

      <!-- Favorite Card -->
      <div class="favorite-card">
        <img src="images/pizza.jpg" alt="Pizza">

        <div class="card-content">
          <h2>Pepperoni Pizza</h2>
          <p>Loaded with cheese and pepperoni.</p>

          <div class="card-footer">
            <span class="price">$15.50</span>
            <button>Remove</button>
          </div>
        </div>
      </div>

    </section>

    <!-- Empty State Example -->
    <!--
    <section class="empty-state">
      <h2>No favorites yet</h2>
      <p>Start saving your favorite meals and restaurants.</p>
    </section>
    -->

  </main>

</body>
</html>
